<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AyuSeva — AI-powered Medical Assistant for preliminary health assessments, symptom analysis, and personalized health guidance.">
    <meta name="theme-color" content="#E8477E">
    <title>AyuSeva — AI Medical Assistant</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="light-mode">
    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="ambient-orb"></div>
        <div class="ambient-orb"></div>
        <div class="ambient-orb"></div>
    </div>

    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-content">
                <div class="header-left">
                    <div class="header-logo">🩺</div>
                    <div class="header-info">
                        <h1>AyuSeva</h1>
                        <span class="subtitle">AI Medical Assistant</span>
                    </div>
                    <div class="status-dot" title="Online"></div>
                </div>
                <div class="header-actions">
                    <button id="planner-button" type="button" class="planner-btn">🏋️ Planner</button>
                </div>
            </div>
        </header>

        <!-- Chat Window -->
        <div class="chat-window" id="chat-window">
            <div class="chat-messages" id="chat-messages">
                <!-- Messages dynamically inserted here -->
            </div>
            <div id="loading-indicator">
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input">
            <input
                type="text"
                id="user-input"
                placeholder="Describe your symptoms or ask a health question..."
                aria-label="Message input"
                autocomplete="off"
            />
            <button id="voice-button" type="button" aria-label="Voice input">🎙️</button>
            <button id="send-button" type="button" aria-label="Send message">
                <span>Send</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Crafted by Ashish Kishore <span class="heartbeat">🩺</span></p>
        </footer>
    </div>

    <!-- Script -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    <!-- Accessibility -->
    <div role="status" aria-live="polite" class="sr-only"></div>
</body>
</html>
